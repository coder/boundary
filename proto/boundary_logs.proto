syntax = "proto3";

package boundary.proto;

option go_package = "github.com/coder/boundary/proto";

import "google/protobuf/timestamp.proto";

// BoundaryLog represents a single boundary audit log entry.
// Field numbers MUST match coder's agent/proto/agent.proto to ensure
// wire format compatibility.
message BoundaryLog {
    bytes workspace_id = 1;
    google.protobuf.Timestamp time = 2;
    bool allowed = 3;
    string http_method = 4;
    string http_url = 5;
    string matched_rule = 6;
}

// BoundaryLogsRequest is sent to the agent socket.
// Field numbers MUST match coder's ReportBoundaryLogsRequest.
message BoundaryLogsRequest {
    repeated BoundaryLog logs = 1;
}
